<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EconChess Analysis</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #161512;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #analysis-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* Панель оценки (Eval Bar) как на Chess.com */
        #eval-bar-container {
            width: 100%;
            height: 12px;
            background-color: #403d39;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        #eval-bar {
            width: 50%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.3s ease;
        }
        #eval-text {
            position: absolute;
            right: 10px;
            top: -1px;
            font-size: 10px;
            color: #000;
            font-weight: bold;
        }
        #board {
            width: 100%;
        }
        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }
        input {
            flex: 1;
            background-color: #262421;
            color: #fff;
        }
        button {
            background-color: #81b64c;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { background-color: #a3d16c; }
        #move-log {
            background-color: #262421;
            padding: 10px;
            border-radius: 8px;
            height: 80px;
            overflow-y: auto;
            font-size: 14px;
        }
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
        }
        .blunder { background-color: #fa3131; color: white; }
        .mistake { background-color: #ff8413; color: white; }
        .inaccuracy { background-color: #f0c514; color: black; }
        .excellent { background-color: #81b64c; color: white; }
        .best { background-color: #4580c4; color: white; }
    </style>
</head>
<body>

<div id="analysis-container">
    <div id="eval-bar-container">
        <div id="eval-bar"></div>
        <span id="eval-text">0.0</span>
    </div>

    <div id="board"></div>

    <div class="controls">
        <input type="text" id="game-input" placeholder="Вставьте PGN игры...">
        <button onclick="loadGame()">Анализ</button>
    </div>

    <div class="controls">
        <button style="flex: 1; background-color: #312e2b;" onclick="moveBack()">◀ Изм.</button>
        <button style="flex: 1; background-color: #312e2b;" onclick="moveForward()">След. ▶</button>
    </div>

    <div id="move-log">Ходы отобразятся здесь после старта анализа...</div>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand(); // Разворачиваем на весь экран смартфона
    }

    let board = null;
    let game = new Chess();
    let moveHistory = [];
    let currentMoveIndex = -1;
    let stockfish = null;

    // Обход CORS для загрузки Stockfish из CDN внутри Web Worker
    const workerCode = "importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');";
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    stockfish = new Worker(URL.createObjectURL(blob));

    // Инициализация доски
    board = ChessBoard('board', {
        position: 'start',
        draggable: true,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    // Слушаем ответы от Stockfish
    stockfish.onmessage = function(event) {
        const line = event.data;
        if (line.includes('score cp')) {
            const match = line.match(/score cp (-?\d+)/);
            if (match) {
                let cp = parseInt(match[1]);
                // Если ход черных, переворачиваем оценку движка для корректного отображения
                if (game.turn() === 'b') cp = -cp; 
                updateEvalBar(cp / 100);
            }
        } else if (line.includes('score mate')) {
            const match = line.match(/score mate (-?\d+)/);
            if (match) updateEvalBar(match[1] > 0 ? "M" : "-M");
        }
    };

    function updateEvalBar(evalValue) {
        const bar = document.getElementById('eval-bar');
        const text = document.getElementById('eval-text');
        
        if (typeof evalValue === 'string') {
            text.innerText = evalValue;
            bar.style.width = evalValue.includes('-') ? '0%' : '100%';
            return;
        }

        text.innerText = evalValue > 0 ? `+${evalValue.toFixed(1)}` : evalValue.toFixed(1);
        // Масштабируем проценты заполнения (оценка от -5 до +5 центпешек)
        let percentage = ((evalValue + 5) / 10) * 100;
        percentage = Math.max(5, Math.min(95, percentage)); // Границы
        bar.style.width = `${percentage}%`;
    }

    function loadGame() {
        const inputData = document.getElementById('game-input').value;
        if (!inputData) return;

        // Чистим старую игру
        game = new Chess();
        
        // Базовый парсинг PGN (работает для большинства скопированных текстов парсий)
        if (game.load_pgn(inputData)) {
            moveHistory = game.history({ verbose: true });
            currentMoveIndex = -1;
            game.reset();
            board.position(game.fen());
            renderMoveLog();
            analyzePosition();
        } else {
            alert('Не удалось распознать PGN. Пожалуйста, вставьте валидный текст партии.');
        }
    }

    function analyzePosition() {
        stockfish.postMessage('position fen ' + game.fen());
        stockfish.postMessage('go depth 12'); // Оптимальная глубина для быстрых мобилок
    }

    function renderMoveLog() {
        const log = document.getElementById('move-log');
        log.innerHTML = '';
        
        moveHistory.forEach((move, index) => {
            if (index % 2 === 0) {
                log.innerHTML += `<b>${Math.floor(index/2) + 1}.</b> `;
            }
            
            // Здесь можно навесить логику Chess.com классификации (упрощенный пример)
            let badge = '';
            if (move.san.includes('??')) badge = '<span class="badge blunder">Зевок</span>';
            else if (move.san.includes('?')) badge = '<span class="badge mistake">Ошибка</span>';
            else if (index === currentMoveIndex) badge = '<span class="badge best">Ход</span>';

            log.innerHTML += `<span style="cursor:pointer; ${index === currentMoveIndex ? 'color:#81b64c; font-weight:bold;' : ''}" onclick="goToMove(${index})">${move.san}</span>${badge} `;
        });
    }

    function goToMove(index) {
        if (index < -1 || index >= moveHistory.length) return;
        
        game.reset();
        for (let i = 0; i <= index; i++) {
            game.move(moveHistory[i].san);
        }
        currentMoveIndex = index;
        board.position(game.fen());
        renderMoveLog();
        analyzePosition();
    }

    function moveBack() { if (currentMoveIndex >= 0) goToMove(currentMoveIndex - 1); }
    function moveForward() { if (currentMoveIndex < moveHistory.length - 1) goToMove(currentMoveIndex + 1); }
</script>
</body>
</html>
